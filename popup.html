<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    body {
      font-family: system-ui, sans-serif;
      width: 260px;
      padding: 16px;
      margin: 0;
      background: #0d0d1a;
      color: #c8c8c8;
    }
    h2 { margin: 0 0 8px; font-size: 15px; color: #ff6640; }
    p  { margin: 0 0 6px; font-size: 12px; color: #999; line-height: 1.5; }
    .tip {
      margin-top: 10px;
      padding: 8px;
      background: #12122a;
      border-radius: 4px;
      border-left: 3px solid #ff6640;
      font-size: 11px;
      color: #aaa;
    }
  </style>
</head>
<body>
  <h2>Tradezilla</h2>
  <p>Automatically captures item data when you search on the Path of Exile trade site.</p>
  <p>A floating panel appears on the page showing affix frequency across all loaded results.</p>
  <div class="tip">
    Navigate to <strong>pathofexile.com/trade</strong> and run a search — the panel will populate as items load.
  </div>
</body>
</html>
